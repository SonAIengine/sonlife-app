name: SonlifeApp
options:
  bundleIdPrefix: com.sonaiengine
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

schemes:
  SonlifeApp:
    build:
      targets:
        SonlifeApp: all
        SonLifeWidgetExtension: [archive]
    run:
      config: Debug
    archive:
      config: Release

targets:
  SonlifeApp:
    type: application
    platform: iOS
    sources:
      - path: SonlifeApp
        excludes:
          - Info.plist
      - path: Shared
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: SonlifeApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.sonaiengine.sonlifeapp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ASPD4J464Z
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "녹음을 위해 마이크 접근이 필요합니다."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "음성을 텍스트로 변환하기 위해 음성 인식 접근이 필요합니다."
        INFOPLIST_KEY_UIBackgroundModes: "audio remote-notification"
        INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: YES
        INFOPLIST_KEY_UISupportsDocumentBrowser: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    entitlements:
      path: SonlifeApp/SonlifeApp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sonaiengine.sonlifeapp
        aps-environment: development
    dependencies:
      - target: SonLifeWidgetExtension

  SonLifeWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: SonLifeWidget
        excludes:
          - Info.plist
      - path: Shared
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: SonLifeWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.sonaiengine.sonlifeapp.widget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ASPD4J464Z
    entitlements:
      path: SonlifeApp/SonlifeApp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sonaiengine.sonlifeapp
        aps-environment: development

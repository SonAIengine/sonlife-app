name: VoiceRecorder
options:
  bundleIdPrefix: com.sonaiengine
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  VoiceRecorder:
    type: application
    platform: iOS
    sources:
      - VoiceRecorder
    settings:
      base:
        INFOPLIST_FILE: VoiceRecorder/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.sonaiengine.voicerecorder
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
    entitlements:
      path: VoiceRecorder/VoiceRecorder.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sonaiengine.voicerecorder

name: VoiceRecorder
options:
  bundleIdPrefix: com.sonaiengine
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  VoiceRecorder:
    type: application
    platform: iOS
    sources:
      - path: VoiceRecorder
        excludes:
          - Info.plist
      - path: Shared
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: VoiceRecorder/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.sonaiengine.voicerecorder
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: XMF443BPZ9
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "녹음을 위해 마이크 접근이 필요합니다."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "음성을 텍스트로 변환하기 위해 음성 인식 접근이 필요합니다."
        INFOPLIST_KEY_UIBackgroundModes: "audio"
        INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: YES
        INFOPLIST_KEY_UISupportsDocumentBrowser: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    entitlements:
      path: VoiceRecorder/VoiceRecorder.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sonaiengine.voicerecorder
    dependencies:
      - target: SonLifeWidgetExtension

  SonLifeWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: SonLifeWidget
      - path: Shared
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.sonaiengine.voicerecorder.widget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: XMF443BPZ9
        INFOPLIST_KEY_CFBundleDisplayName: SonLife
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
    entitlements:
      path: VoiceRecorder/VoiceRecorder.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sonaiengine.voicerecorder
